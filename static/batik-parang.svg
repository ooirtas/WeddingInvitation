<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <defs>
    <pattern id="parang" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="100" height="100" fill="none"/>
      
      <!-- Primary wave (Parang motif) -->
      <path d="M20 0 Q 30 25, 20 50 Q 10 75, 20 100" stroke="#c69b58" stroke-width="4" fill="none" opacity="0.3"/>
      <path d="M50 0 Q 60 25, 50 50 Q 40 75, 50 100" stroke="#c69b58" stroke-width="4" fill="none" opacity="0.3"/>
      <path d="M80 0 Q 90 25, 80 50 Q 70 75, 80 100" stroke="#c69b58" stroke-width="4" fill="none" opacity="0.3"/>
      
      <!-- Secondary interlacing detail (Mlinjon) -->
      <path d="M35 12 L 35 38 M 32 25 L 38 25" stroke="#c69b58" stroke-width="1.5" fill="none" opacity="0.4"/>
      <path d="M35 62 L 35 88 M 32 75 L 38 75" stroke="#c69b58" stroke-width="1.5" fill="none" opacity="0.4"/>
      
      <path d="M65 12 L 65 38 M 62 25 L 68 25" stroke="#c69b58" stroke-width="1.5" fill="none" opacity="0.4"/>
      <path d="M65 62 L 65 88 M 62 75 L 68 75" stroke="#c69b58" stroke-width="1.5" fill="none" opacity="0.4"/>
      
      <!-- Small diamond accents -->
      <polygon points="35,22 38,25 35,28 32,25" fill="#c69b58" opacity="0.5"/>
      <polygon points="35,72 38,75 35,78 32,75" fill="#c69b58" opacity="0.5"/>
      <polygon points="65,22 68,25 65,28 62,25" fill="#c69b58" opacity="0.5"/>
      <polygon points="65,72 68,75 65,78 62,75" fill="#c69b58" opacity="0.5"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#parang)"/>
</svg>
