<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Premium Floral Corner Ornament -->
  <g opacity="0.85">
    <!-- Main outer flourishing curve -->
    <path d="M10 190 C40 150, 70 120, 90 80 C110 40, 150 20, 190 10" stroke="#c69b58" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    
    <!-- Secondary curves -->
    <path d="M25 150 C55 150, 90 120, 95 80" stroke="#c69b58" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.7"/>
    <path d="M50 120 C80 120, 110 90, 120 50" stroke="#c69b58" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6"/>
    
    <!-- Intricate Floral Leaves -->
    <path d="M140 30 C130 50, 120 70, 100 80 C120 85, 140 100, 150 120 C155 90, 175 60, 190 45 C170 40, 150 35, 140 30 Z" fill="#c69b58" opacity="0.4"/>
    <path d="M100 80 C95 100, 80 115, 60 125 C80 130, 95 145, 105 165 C110 140, 125 120, 145 110 C125 105, 110 90, 100 80 Z" fill="#c69b58" opacity="0.25"/>
    
    <!-- Delicate spirals -->
    <path d="M140 30 C150 20, 160 25, 165 35 C170 45, 160 55, 150 50" stroke="#c69b58" stroke-width="1" fill="none" opacity="0.8"/>
    <path d="M100 80 C110 70, 120 75, 125 85 C130 95, 120 105, 110 100" stroke="#c69b58" stroke-width="1" fill="none" opacity="0.8"/>
    
    <!-- Accent dots -->
    <circle cx="150" cy="120" r="4" fill="#c69b58" opacity="0.6"/>
    <circle cx="105" cy="165" r="3" fill="#c69b58" opacity="0.5"/>
    <circle cx="190" cy="45" r="3" fill="#c69b58" opacity="0.5"/>
    <circle cx="145" cy="110" r="2" fill="#c69b58" opacity="0.4"/>
    <circle cx="60" cy="125" r="2" fill="#c69b58" opacity="0.4"/>
  </g>
</svg>
