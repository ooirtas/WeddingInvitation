<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" fill="none">
  <!-- Minimal elegant Wayang Kulit silhouette (Rama/Arjuna style) -->
  <g opacity="0.15">
    <!-- Body and Legs -->
    <path d="M100 120 C110 150, 115 180, 105 210 L80 280 M105 210 L130 280" stroke="#c69b58" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Arms -->
    <path d="M95 125 C70 140, 60 170, 75 190 L60 260" stroke="#c69b58" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M105 125 C130 135, 145 160, 135 185 L145 250" stroke="#c69b58" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    
    <!-- Torso and Clothing accents -->
    <path d="M90 120 C85 150, 115 150, 110 120 Z" fill="#c69b58"/>
    <path d="M85 160 C70 180, 130 180, 115 160" stroke="#c69b58" stroke-width="2" fill="none"/>
    <path d="M85 180 C60 210, 140 210, 115 180" stroke="#c69b58" stroke-width="1.5" stroke-dasharray="3 3" fill="none"/>
    
    <!-- Head and Headdress (Mahkota) -->
    <path d="M100 110 C85 110, 85 85, 100 85 C115 85, 115 110, 100 110 Z" fill="#c69b58"/>
    <path d="M95 85 C90 50, 110 50, 105 85 Z" fill="#c69b58"/>
    <path d="M100 40 C80 60, 120 60, 100 40 Z" fill="#c69b58"/>
    <path d="M95 85 C70 80, 70 50, 95 65" stroke="#c69b58" stroke-width="2" fill="none"/>
    
    <!-- Profile (Nose/Chin) -->
    <path d="M90 95 L80 100 L85 105 L80 110 L90 105" fill="#c69b58"/>
  </g>
</svg>
